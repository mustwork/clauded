---
# Install Claude Code on Ubuntu (glibc)
# See: https://code.claude.com/docs/en/setup

- name: Install Claude Code dependencies
  apt:
    name:
      - curl
      - ripgrep
    state: present
    update_cache: yes

- name: Get remote username
  become: no
  command: whoami
  register: claude_remote_user
  changed_when: false

- name: Get remote home directory
  become: no
  shell: echo $HOME
  register: claude_remote_home
  changed_when: false

- name: Create .local/bin directory for user
  file:
    path: "{{ claude_remote_home.stdout }}/.local/bin"
    state: directory
    owner: "{{ claude_remote_user.stdout }}"
    group: "{{ claude_remote_user.stdout }}"
    mode: '0755'

- name: Resolve Claude Code version
  become: no
  shell: |
    set -e
    if [ "{{ claude_code_version }}" = "latest" ]; then
      curl -fsSL "{{ downloads.claude_code.gcs_bucket }}/latest" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+'
    else
      echo "{{ claude_code_version }}"
    fi
  register: resolved_claude_code_version
  changed_when: false

- name: Download Claude Code binary directly
  become: no
  shell: |
    set -e
    ARCH=$(uname -m)
    case "$ARCH" in
      aarch64|arm64) PLATFORM="linux-arm64" ;;
      x86_64) PLATFORM="linux-x64" ;;
      *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
    esac
    BINARY_URL="{{ downloads.claude_code.gcs_bucket }}/{{ resolved_claude_code_version.stdout }}/$PLATFORM/claude"
    curl -fsSL "$BINARY_URL" -o ~/.local/bin/claude
    chmod +x ~/.local/bin/claude

- name: Create Claude Code config file
  copy:
    dest: "{{ claude_remote_home.stdout }}/.claude.json"
    content: "{}"
    owner: "{{ claude_remote_user.stdout }}"
    group: "{{ claude_remote_user.stdout }}"
    mode: '0600'
    force: no

- name: Configure Claude Code environment for Ubuntu
  copy:
    dest: /etc/profile.d/claude.sh
    content: |
      export PATH="$HOME/.local/bin:$PATH"
      {% if claude_dangerously_skip_permissions | default(false) %}
      export CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=true
      {% endif %}
    mode: '0644'

- name: Verify Claude Code binary exists
  become: no
  stat:
    path: "{{ claude_remote_home.stdout }}/.local/bin/claude"
  register: claude_binary

- name: Display Claude Code installation status
  debug:
    msg: "Claude Code {{ resolved_claude_code_version.stdout }} installed: {{ claude_binary.stat.exists | default(false) }}"
