---
# Alpine/musl requires libgcc, libstdc++, ripgrep and USE_BUILTIN_RIPGREP=0
# See: https://code.claude.com/docs/en/setup

- name: Install Claude Code musl dependencies
  apk:
    name:
      - libgcc
      - libstdc++
      - ripgrep
    state: present

- name: Get remote username
  become: no
  command: whoami
  register: claude_remote_user
  changed_when: false

- name: Get remote home directory
  become: no
  shell: echo $HOME
  register: claude_remote_home
  changed_when: false

- name: Create .local/bin directory for user
  file:
    path: "{{ claude_remote_home.stdout }}/.local/bin"
    state: directory
    owner: "{{ claude_remote_user.stdout }}"
    group: "{{ claude_remote_user.stdout }}"
    mode: '0755'

- name: Resolve Claude Code version
  become: no
  shell: |
    set -e
    if [ "{{ claude_code_version }}" = "latest" ]; then
      curl -fsSL "{{ downloads.claude_code.gcs_bucket }}/latest" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+'
    else
      echo "{{ claude_code_version }}"
    fi
  register: resolved_claude_code_version
  changed_when: false

- name: Download Claude Code binary directly
  become: no
  shell: |
    set -e
    ARCH=$(uname -m)
    case "$ARCH" in
      aarch64|arm64) PLATFORM="linux-arm64-musl" ;;
      x86_64) PLATFORM="linux-x64-musl" ;;
      *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
    esac
    BINARY_URL="{{ downloads.claude_code.gcs_bucket }}/{{ resolved_claude_code_version.stdout }}/$PLATFORM/claude"
    curl -fsSL "$BINARY_URL" -o ~/.local/bin/claude
    chmod +x ~/.local/bin/claude

- name: Create Claude Code config file
  copy:
    dest: "{{ claude_remote_home.stdout }}/.claude.json"
    content: "{}"
    owner: "{{ claude_remote_user.stdout }}"
    group: "{{ claude_remote_user.stdout }}"
    mode: '0600'
    force: no

# Alpine 3.21 ships musl 1.2.5 which lacks posix_getdents (added in 1.2.6).
# Build a shim .so that provides the symbol via getdents64 syscall.
# TODO: Remove when Alpine base image ships musl >= 1.2.6 (expected Alpine 3.22).
- name: Check if system musl already provides posix_getdents
  shell: grep -q posix_getdents /lib/ld-musl-*.so.1 2>/dev/null
  register: musl_has_posix_getdents
  failed_when: false
  changed_when: false

- name: Copy posix_getdents shim source
  copy:
    src: posix_getdents_shim.c
    dest: /tmp/posix_getdents_shim.c
  when: musl_has_posix_getdents.rc != 0

- name: Compile posix_getdents shim
  command: gcc -shared -fPIC -o /usr/lib/posix_getdents_shim.so /tmp/posix_getdents_shim.c
  when: musl_has_posix_getdents.rc != 0

- name: Remove shim source
  file:
    path: /tmp/posix_getdents_shim.c
    state: absent

- name: Configure Claude Code environment for Alpine
  copy:
    dest: /etc/profile.d/claude.sh
    content: |
      [ -f /usr/lib/posix_getdents_shim.so ] && export LD_PRELOAD=/usr/lib/posix_getdents_shim.so
      export USE_BUILTIN_RIPGREP=0
      export PATH="$HOME/.local/bin:$PATH"
      {% if claude_dangerously_skip_permissions | default(false) %}
      export CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=true
      {% endif %}
    mode: '0644'

- name: Verify Claude Code binary exists
  become: no
  stat:
    path: "{{ claude_remote_home.stdout }}/.local/bin/claude"
  register: claude_binary

- name: Display Claude Code installation status
  debug:
    msg: "Claude Code {{ resolved_claude_code_version.stdout }} installed: {{ claude_binary.stat.exists | default(false) }}"
