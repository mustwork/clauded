---
# Install Dart SDK on Ubuntu using official download

- name: Install dependencies for Dart and Flutter
  apt:
    name:
      - curl
      - unzip
      - git
    state: present
    update_cache: yes

- name: Remove existing Dart installation
  file:
    path: /usr/local/dart-sdk
    state: absent

- name: Set Dart download metadata
  set_fact:
    dart_download: "{{ downloads.dart.versions[dart_version] | default(downloads.dart.versions[downloads.dart.default_version]) }}"
    dart_effective_version: "{{ dart_version if dart_version in downloads.dart.versions else downloads.dart.default_version }}"

- name: Download Dart SDK {{ dart_effective_version }}
  get_url:
    url: "{{ dart_download.url }}"
    dest: /tmp/dart-sdk.zip
    mode: '0644'

- name: Create Dart SDK directory
  file:
    path: /usr/local/dart-sdk
    state: directory
    mode: '0755'

- name: Extract Dart SDK to /usr/local/dart-sdk
  unarchive:
    src: /tmp/dart-sdk.zip
    dest: /usr/local
    remote_src: yes
    creates: /usr/local/dart-sdk/bin/dart

- name: Set Dart and Flutter environment variables system-wide
  copy:
    dest: /etc/profile.d/dart.sh
    content: |
      export DART_SDK=/usr/local/dart-sdk
      export PATH=/usr/local/flutter/bin:$DART_SDK/bin:$HOME/.pub-cache/bin:$PATH
    mode: '0644'

- name: Create symlinks for Dart binaries
  file:
    src: "/usr/local/dart-sdk/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
  loop:
    - dart

- name: Clean up downloaded archive
  file:
    path: /tmp/dart-sdk.zip
    state: absent

- name: Verify Dart installation
  command: /usr/local/dart-sdk/bin/dart --version
  register: dart_version_output
  changed_when: false

- name: Display Dart version
  debug:
    msg: "Dart version: {{ dart_version_output.stdout }}"

# Flutter SDK — always installed alongside Dart (via git clone, no prebuilt ARM64 archive)
- name: Remove existing Flutter installation
  file:
    path: /usr/local/flutter
    state: absent

- name: Clone Flutter SDK {{ downloads.flutter.version }}
  git:
    repo: "{{ downloads.flutter.repo }}"
    dest: /usr/local/flutter
    version: "{{ downloads.flutter.git_ref }}"
    depth: 1

- name: Mark Flutter directory as safe for git
  command: git config --system --add safe.directory /usr/local/flutter
  changed_when: false

- name: Set up Flutter stable branch for upgrade support
  shell: |
    cd /usr/local/flutter
    git checkout -b stable
    git remote set-branches origin stable
  changed_when: false

- name: Bootstrap Flutter SDK
  command: /usr/local/flutter/bin/flutter --version
  register: flutter_version_output
  changed_when: false
  environment:
    HOME: "{{ remote_home.stdout }}"

- name: Configure Flutter (disable analytics)
  command: /usr/local/flutter/bin/flutter config --no-analytics
  changed_when: false
  environment:
    HOME: "{{ remote_home.stdout }}"

- name: Set Flutter SDK ownership to VM user
  file:
    path: /usr/local/flutter
    owner: "{{ remote_whoami.stdout }}"
    group: "{{ remote_whoami.stdout }}"
    recurse: yes

- name: Ensure pub-cache directory exists with correct ownership
  file:
    path: "{{ remote_home.stdout }}/.pub-cache"
    state: directory
    owner: "{{ remote_whoami.stdout }}"
    group: "{{ remote_whoami.stdout }}"
    mode: '0755'

- name: Display Flutter version
  debug:
    msg: "Flutter version: {{ flutter_version_output.stdout_lines[0] }}"
